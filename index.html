        // 确保有96个城市（去重并补充）
        function ensure96Cities() {
            const uniqueCities = [];
            const seen = new Set();
            for (const city of cities) {
                if (!seen.has(city.name)) {
                    seen.add(city.name);
                    uniqueCities.push(city);
                }
            }
            
            // 如果不够96个，复制一些城市并稍作修改
            while (uniqueCities.length < 96) {
                const baseCity = uniqueCities[uniqueCities.length % uniqueCities.length];
                const newCity = {...baseCity, name: baseCity.name + " (周边)"};
                uniqueCities.push(newCity);
            }
            
            return uniqueCities.slice(0, 96);
        }

        // 选择选项
        function selectOption(index) {
            // 如果是修改之前的答案，先减去之前的分数
            if (userAnswers[currentQuestion]) {
                const prevScores = questions[currentQuestion].options[userAnswers[currentQuestion]].scores;
                for (let i = 0; i < 6; i++) {
                    userScores[i] -= prevScores[i];
                }
            }
            
            // 记录新答案并加分
            userAnswers[currentQuestion] = index;
            const scores = questions[currentQuestion].options[index].scores;
            for (let i = 0; i < 6; i++) {
                userScores[i] += scores[i];
            }
            
            // 下一题或结束
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion();
            } else {
                showResult();
            }
        }

        // 上一题
        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion();
            }
        }

        // 计算匹配度
        function calculateMatch(userScores, cityScores) {
            // 归一化用户得分
            const maxPossibleScore = questions.length * 3;
            const normalizedUser = userScores.map(s => s / maxPossibleScore);
            
            // 城市得分已经是0-3范围，归一化
            const normalizedCity = cityScores.map(s => s / 3);
            
            // 计算余弦相似度
            let dotProduct = 0;
            let userNorm = 0;
            let cityNorm = 0;
            
            for (let i = 0; i < 6; i++) {
                dotProduct += normalizedUser[i] * normalizedCity[i];
                userNorm += normalizedUser[i] * normalizedUser[i];
                cityNorm += normalizedCity[i] * normalizedCity[i];
            }
            
            const similarity = dotProduct / (Math.sqrt(userNorm) * Math.sqrt(cityNorm));
            return Math.round(similarity * 100);
        }

        // 显示结果
        function showResult() {
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';
            
            // 计算所有城市的匹配度
            const matches = finalCities.map(city => ({
                city,
                match: calculateMatch(userScores, city.scores)
            }));
            
            // 排序
            matches.sort((a, b) => b.match - a.match);
            
            // 绘制雷达图
            drawRadarChart();
            
            // 显示第一名
            const top = matches[0];
            document.getElementById('topCity').innerHTML = `
                <div class="city-name">${top.city.name}</div>
                <div class="match-percent">匹配度：${top.match}%</div>
                <div class="tags-group">
                    ${top.city.typeTags.map(t => `<span class="tag tag-type">${t}</span>`).join('')}
                </div>
                <div class="tags-group">
                    ${top.city.featureTags.map(t => `<span class="tag tag-feature">${t}</span>`).join('')}
                </div>
                <p class="match-reason">${top.city.reason}</p>
            `;
            
            // 显示第二到第六名
            let otherHtml = '<h3 class="other-city-title">也很适合你的城市</h3>';
            for (let i = 1; i <= 5; i++) {
                const m = matches[i];
                otherHtml += `
                    <div class="other-city-item">
                        <div class="other-city-name">第${i + 1}名：${m.city.name}</div>
                        <div class="other-city-percent">匹配度：${m.match}%</div>
                        <div class="tags-group">
                            ${m.city.typeTags.map(t => `<span class="tag tag-type">${t}</span>`).join('')}
                        </div>
                        <div class="tags-group">
                            ${m.city.featureTags.map(t => `<span class="tag tag-feature">${t}</span>`).join('')}
                        </div>
                        <p class="other-city-reason">${m.city.reason}</p>
                    </div>
                `;
            }
            document.getElementById('otherCities').innerHTML = otherHtml;
        }

        // 绘制雷达图
        function drawRadarChart() {
            const ctx = document.getElementById('radarChart').getContext('2d');
            
            // 归一化用户得分到0-100
            const maxScore = questions.length * 3;
            const normalizedScores = userScores.map(s => Math.round((s / maxScore) * 100));
            
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: DIMENSIONS,
                    datasets: [{
                        label: '你的性格维度',
                        data: normalizedScores,
                        backgroundColor: 'rgba(102, 126, 234, 0.2)',
                        borderColor: 'rgba(102, 126, 234, 1)',
                        borderWidth: 2,
                        pointBackgroundColor: 'rgba(118, 75, 162, 1)',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: 'rgba(118, 75, 162, 1)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 100,
                            ticks: {
                                stepSize: 20,
                                font: {
                                    size: 10
                                }
                            },
                            pointLabels: {
                                font: {
                                    size: 11
                                }
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
